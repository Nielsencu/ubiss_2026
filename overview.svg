<svg xmlns="http://www.w3.org/2000/svg" width="940" height="440" viewBox="0 0 940 440" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrowStart" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M8,0 L0,3 L8,6 Z" fill="#555"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#43a047"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="940" height="440" rx="14" fill="#fafafa" stroke="#e0e0e0"/>

  <!-- title -->
  <text x="470" y="50" text-anchor="middle" font-size="30" font-weight="700" fill="#c0392b">🥪 Panini Monster</text>
  <text x="470" y="78" text-anchor="middle" font-size="14" fill="#666">UBISS 2026 · Workshop C — Robot Makers · Oulu, Finland</text>

  <!-- Board A: Panini Monster -->
  <rect x="50" y="110" width="270" height="215" rx="12" fill="#fff3e0" stroke="#e8943a" stroke-width="2"/>
  <text x="185" y="138" text-anchor="middle" font-size="16" font-weight="700" fill="#b9650f">Board A — Panini Monster</text>
  <text x="185" y="156" text-anchor="middle" font-size="11" fill="#a06a2c">ESP32 · drives &amp; sings</text>
  <text x="72" y="190" font-size="13" fill="#5a3d1a">• 2× continuous-rotation servos</text>
  <text x="72" y="218" font-size="13" fill="#5a3d1a">• I2S speaker — MP3 songs</text>
  <text x="72" y="246" font-size="13" fill="#5a3d1a">• MFRC522 RFID reader</text>
  <text x="72" y="274" font-size="13" fill="#5a3d1a">• HC-SR04 ultrasonic sensor</text>
  <text x="72" y="302" font-size="13" fill="#5a3d1a">• ESP-NOW radio</text>

  <!-- Board B: Scoreboard -->
  <rect x="620" y="110" width="270" height="215" rx="12" fill="#e3f2fd" stroke="#3a7bd5" stroke-width="2"/>
  <text x="755" y="138" text-anchor="middle" font-size="16" font-weight="700" fill="#1f5fb0">Board B — Scoreboard</text>
  <text x="755" y="156" text-anchor="middle" font-size="11" fill="#3f6ea5">ESP32-WROVER · dual-core</text>
  <text x="642" y="190" font-size="13" fill="#1c3c5e">• 28BYJ-48 stepper arm</text>
  <text x="642" y="218" font-size="13" fill="#1c3c5e">• 4-digit 7-segment display</text>
  <text x="642" y="246" font-size="13" fill="#1c3c5e">• Counts paninis eaten</text>
  <text x="642" y="274" font-size="13" fill="#1c3c5e">• ESP-NOW radio</text>

  <!-- ESP-NOW link between A and B -->
  <text x="470" y="190" text-anchor="middle" font-size="14" font-weight="700" fill="#333">⇄ ESP-NOW</text>
  <line x1="328" y1="208" x2="612" y2="208" stroke="#555" stroke-width="2" marker-start="url(#arrowStart)" marker-end="url(#arrow)"/>
  <text x="470" y="230" text-anchor="middle" font-size="11.5" fill="#555">RFID scan → +1 on display</text>

  <!-- Camera node -->
  <rect x="250" y="350" width="180" height="72" rx="12" fill="#ede7f6" stroke="#7e57c2" stroke-width="2"/>
  <text x="340" y="378" text-anchor="middle" font-size="15" font-weight="700" fill="#5e35b1">📷 ESP32 Camera</text>
  <text x="340" y="398" text-anchor="middle" font-size="11.5" fill="#6a4ba0">rides on the monster</text>
  <text x="340" y="414" text-anchor="middle" font-size="11.5" fill="#6a4ba0">live MJPEG stream</text>

  <!-- WiFi stream arrow -->
  <line x1="432" y1="386" x2="516" y2="386" stroke="#43a047" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrowGreen)"/>
  <text x="474" y="375" text-anchor="middle" font-size="11" fill="#2e7d32">📶 WiFi</text>

  <!-- Browser / viewer node -->
  <rect x="520" y="350" width="170" height="72" rx="12" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="605" y="384" text-anchor="middle" font-size="15" font-weight="700" fill="#2e7d32">🖥️ Browser</text>
  <text x="605" y="404" text-anchor="middle" font-size="11.5" fill="#2f7d33">watch the monster's POV</text>
</svg>
